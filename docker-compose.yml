version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: dale_voz
      POSTGRES_USER: dalevotz
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nova-core:
    build:
      context: ../nova-core
      dockerfile: Dockerfile
    environment:
      PORT: 3001
      NODE_ENV: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      - redis

  dale-voz:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      DATABASE_URL: postgresql://dalevotz:changeme@postgres:5432/dale_voz
      NOVA_CORE_URL: http://nova-core:3001
      META_BUSINESS_ACCOUNT_ID: ${META_BUSINESS_ACCOUNT_ID}
      META_WHATSAPP_PHONE_ID_CONVERSATIONS: ${META_WHATSAPP_PHONE_ID_CONVERSATIONS}
      META_WHATSAPP_PHONE_ID_NOTIFICATIONS: ${META_WHATSAPP_PHONE_ID_NOTIFICATIONS}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN}
      MERCADO_PAGO_ACCESS_TOKEN: ${MERCADO_PAGO_ACCESS_TOKEN}
      MERCADO_PAGO_PUBLIC_KEY: ${MERCADO_PAGO_PUBLIC_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
      - nova-core

volumes:
  postgres_data:
